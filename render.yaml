services:
  - type: web
    name: nebulous-world
    runtime: node
    repo: https://github.com/Dodecahedr0x/appmap
    rootDir: app
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    # This app has no Postgres connection at all any more — the indexer
    # (below) owns the database, applies its own schema, and is the only
    # thing that ever queries it (see root AGENTS.md and
    # src/lib/indexerClient.ts). No `prisma db push`/`migrate`/`generate`
    # in this build — there is no Prisma dependency left in app/.
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # --- Solana ---
      # Only used to tell the connected wallet extension which chain it's
      # operating on (see SolanaProvider.tsx) — this app has no RPC
      # connection of its own. Every on-chain read/write goes through the
      # indexer instead (see INDEXER_API_URL below and src/lib/indexerClient.ts).
      - key: NEXT_PUBLIC_SOLANA_RPC
        value: https://api.devnet.solana.com
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
      - key: NEXT_PUBLIC_NEBULOUS_WORLD_PROGRAM_ID
        value: EkQRRgRFd2FUedJnPVs2Xs6N7U2Jef5GrfwJ62UJZUXx
      - key: NEXT_PUBLIC_VOTE_TOKEN_DECIMALS
        value: "6"
      # Leave unset to run in off-chain "simulation" mode. Fill in once a
      # real SPL vote-token mint / treasury address exist for this deploy —
      # and set the same mint on nebulous-world-indexer below, which needs
      # it to build vote/stake/claim transactions.
      - key: NEXT_PUBLIC_VOTE_TOKEN_MINT
        sync: false
      - key: NEXT_PUBLIC_TREASURY_ADDRESS
        sync: false

      # --- Indexer ---
      # Render's internal service-to-service networking — nebulous-world-indexer
      # is a private service (pserv), reachable only from other services in
      # this account/region, never from the public internet. See
      # indexer/README.md and src/lib/indexerClient.ts.
      - key: INDEXER_API_URL
        value: http://nebulous-world-indexer:8090

      # --- App config ---
      - key: TRACKING_SECRET
        generateValue: true
      - key: AD_CPM
        value: "2.5"

      # --- Cloudflare Turnstile (leave unset to run without bot verification;
      # page views are then recorded as not revenue-eligible) ---
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false

  # Writes the AppStatsSnapshot rows that power per-app trend charts (see
  # app/scripts/dailySnapshot.ts) by calling the indexer's HTTP API — no
  # direct database access, same as the web service above.
  - type: cron
    name: nebulous-world-daily-snapshot
    runtime: node
    repo: https://github.com/Dodecahedr0x/appmap
    rootDir: app
    plan: starter
    schedule: "0 0 * * *"
    buildCommand: npm ci
    startCommand: npm run snapshot:daily
    envVars:
      - key: INDEXER_API_URL
        value: http://nebulous-world-indexer:8090

  # Carbon (https://github.com/sevenlabs-hq/carbon) indexer: watches every
  # account owned by the nebulous_world program and every instruction sent
  # to it, runs periodic processing tasks that turn that raw on-chain data
  # into visualization-ready rows, AND is nebulous-world's (the app
  # service above) only path to Solana RPC — it exposes an HTTP API
  # (src/api.rs) for account reads and transaction building/submission
  # (see indexer/README.md). Private — no public HTTP surface, only
  # reachable on Render's internal network, since nothing outside this
  # deployment (i.e. no browser) ever calls it directly.
  #
  # This service also OWNS the database schema (indexer/src/db.rs runs
  # `sqlx::migrate!()` against every file in indexer/migrations/, including
  # the product schema mirrored from app/prisma/schema.prisma) and is the
  # only writer of App/Tag/AppTag rows — the app service above never runs
  # `prisma db push`/`migrate` and has no seed script (see AGENTS.md). On a
  # brand-new database, the app service may serve briefly before this
  # service's first successful migration; nothing in the app's own read
  # paths creates tables, so this settles itself once the indexer comes up.
  - type: pserv
    name: nebulous-world-indexer
    runtime: docker
    repo: https://github.com/Dodecahedr0x/appmap
    dockerContext: indexer
    dockerfilePath: indexer/Dockerfile
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nebulous-world-db
          property: connectionString
      - key: NEXT_PUBLIC_SOLANA_RPC
        value: https://api.devnet.solana.com
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
      - key: NEXT_PUBLIC_NEBULOUS_WORLD_PROGRAM_ID
        value: EkQRRgRFd2FUedJnPVs2Xs6N7U2Jef5GrfwJ62UJZUXx
      # Must match nebulous-world's (the app service above) own
      # NEXT_PUBLIC_VOTE_TOKEN_MINT — this is what src/api.rs derives
      # `user_token_account` ATAs against when building vote/stake/claim
      # transactions. Leave unset while the app itself is in simulation
      # mode (it won't call the tx-build endpoints that need it).
      - key: NEXT_PUBLIC_VOTE_TOKEN_MINT
        sync: false
      # NEB/USDC Meteora DLMM pool address — created by
      # app/scripts/launch-neb/ at deployment time, forwarded to the
      # dlmm-bridge sidecar (see dlmm-bridge/README.md). Leave unset until
      # that script has been run.
      - key: NEXT_PUBLIC_NEB_DLMM_POOL
        sync: false
      # devnet's public RPC serves WS on the same host/port as HTTP — see
      # default_ws_url in indexer/src/config.rs — so this only needs
      # setting for providers that don't (e.g. a paid RPC on a different
      # WS port).
      - key: RPC_WS_URL
        sync: false
      - key: ROLLUP_INTERVAL_SECS
        value: "60"
      - key: CRAWLER_POLL_INTERVAL_SECS
        value: "15"
      - key: PLATFORM_METRICS_INTERVAL_SECS
        value: "3600"
      - key: INDEXER_API_PORT
        value: "8090"

databases:
  - name: nebulous-world-db
    databaseName: nebulous_world
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
