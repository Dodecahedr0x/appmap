[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
nebulous_world = "EkQRRgRFd2FUedJnPVs2Xs6N7U2Jef5GrfwJ62UJZUXx"

[programs.localnet]
nebulous_world = "EkQRRgRFd2FUedJnPVs2Xs6N7U2Jef5GrfwJ62UJZUXx"

[provider]
# Devnet's public RPC is currently unreliable for program deploys (repeated
# "Max retries exceeded" on data writes). Defaulting to localnet until that
# clears up; pass --provider.cluster devnet to override for a one-off deploy.
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.anchor.json -t 1000000 tests/**/*.ts"

[hooks]
